<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style> body { background: transparent; } canvas { background: #0f172a; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; display: block; margin: 10px auto; } </style>
</head>
<body>
    <h2>Rắn Săn Mồi 🐍</h2>
    <div style="font-size:1.1rem; margin: 5px 0;">Điểm: <span id="s-score">0</span></div>
    <canvas id="snakeCanvas" width="270" height="270"></canvas>

    <script>
        const canvas = document.getElementById("snakeCanvas"); const ctx = canvas.getContext("2d");
        const box = 15; let score = 0; let snake = [{x: 9*box, y: 9*box}];
        let food = {x: Math.floor(Math.random()*18)*box, y: Math.floor(Math.random()*18)*box};
        let d = "RIGHT";

        document.onkeydown = (e) => {
            if ((e.key==="ArrowLeft" || e.key==="a") && d!=="RIGHT") d="LEFT";
            else if ((e.key==="ArrowUp" || e.key==="w") && d!=="DOWN") d="UP";
            else if ((e.key==="ArrowRight" || e.key==="d") && d!=="LEFT") d="RIGHT";
            else if ((e.key==="ArrowDown" || e.key==="s") && d!=="UP") d="DOWN";
        };

        function draw() {
            ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<snake.length; i++) {
                ctx.fillStyle = i===0 ? "#deff9a" : "#65a30d";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "#ef4444"; ctx.fillRect(food.x, food.y, box, box);

            let sX = snake[0].x, sY = snake[0].y;
            if(d==="LEFT") sX -= box; if(d==="UP") sY -= box; if(d==="RIGHT") sX += box; if(d==="DOWN") sY -= box;

            if(sX===food.x && sY===food.y) {
                score++; document.getElementById('s-score').innerText = score;
                food = {x: Math.floor(Math.random()*18)*box, y: Math.floor(Math.random()*18)*box};
            } else { snake.pop(); }

            let head = {x: sX, y: sY};
            if(sX<0 || sY<0 || sX>=canvas.width || sY>=canvas.height || snake.some(s => s.x===head.x && s.y===head.y)) {
                clearInterval(game); alert("Thua cuộc! Hệ thống tự động reset."); location.reload();
            }
            snake.unshift(head);
        }
        let game = setInterval(draw, 130);
    </script>
</body>
</html>
