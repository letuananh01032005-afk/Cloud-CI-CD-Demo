<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: transparent; text-align: center; }
        canvas { background: #0f172a; border: 3px solid var(--accent-color); border-radius: 16px; display: block; margin: 15px auto; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <h2 style="color: var(--accent-color);">Rắn Săn Mồi 🐍</h2>
    <div style="font-size: 1.3rem; margin-top: 5px;">Điểm số: <span id="s-score" style="font-weight:bold;">0</span></div>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snakeCanvas"); 
        const ctx = canvas.getContext("2d");
        const box = 20; 
        let score = 0; 
        let snake = [{x: 9 * box, y: 9 * box}];
        let food = {x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box};
        let d = "RIGHT";

        // Nhận điều khiển (Đã sửa lỗi nút đi xuống)
        document.onkeydown = (e) => {
            if ((e.key === "ArrowLeft" || e.key === "a") && d !== "RIGHT") d = "LEFT";
            else if ((e.key === "ArrowUp" || e.key === "w") && d !== "DOWN") d = "UP";
            else if ((e.key === "ArrowRight" || e.key === "d") && d !== "LEFT") d = "RIGHT";
            else if ((e.key === "ArrowDown" || e.key === "s") && d !== "UP") d = "DOWN"; // Cố định đi xuống
        };

        function draw() {
            ctx.fillStyle = "#0f172a"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Vẽ rắn
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? "#deff9a" : "#65a30d";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#0f172a";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }
            
            // Vẽ mồi
            ctx.fillStyle = "#ef4444"; 
            ctx.fillRect(food.x, food.y, box, box);
            
            let sX = snake[0].x;
            let sY = snake[0].y;
            
            if(d === "LEFT") sX -= box; 
            if(d === "UP") sY -= box;
            if(d === "RIGHT") sX += box; 
            if(d === "DOWN") sY += box; // Đi xuống chính xác trên trục Y

            if(sX === food.x && sY === food.y) {
                score++; 
                document.getElementById('s-score').innerText = score;
                food = {x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box};
            } else { 
                snake.pop(); 
            }
            
            let head = {x: sX, y: sY};
            
            if(sX < 0 || sY < 0 || sX >= canvas.width || sY >= canvas.height || snake.some(s => s.x === head.x && s.y === head.y)) {
                clearInterval(game); 
                alert("Trò chơi kết thúc! Số điểm của bạn: " + score); 
                location.reload();
            }
            
            snake.unshift(head);
        }
        let game = setInterval(draw, 130);
    </script>
</body>
</html>
