<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .mole-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 20px; }
        .hole { background: #1e293b; width: 140px; height: 140px; border-radius: 50%; position: relative; overflow: hidden; border: 5px solid #334155; box-shadow: inset 0 10px 0 rgba(0,0,0,0.5); }
        .mole { font-size: 75px; position: absolute; bottom: -140px; left: 50%; transform: translateX(-50%); transition: bottom 0.18s ease-out; cursor: pointer; user-select: none; z-index: 5; }
        .mole.up { bottom: 15px; } /* Đẩy chuột nhô lên khỏi hang */
    </style>
</head>
<body>
    <h2 style="color: var(--accent-color);">Đập Chuột Máy 🔨</h2>
    <div style="font-size: 1.3rem; margin-top: 5px;">Số chuột đã đập: <span id="mo-score" style="font-weight:bold;">0</span></div>
    <div class="mole-grid" id="grid"></div>

    <script>
        const grid = document.getElementById('grid');
        // Tạo tự động 9 hang chuột
        grid.innerHTML = Array(9).fill('<div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>').join('');
        
        let score = 0;
        let lastMole = null;

        function peep() {
            const moles = document.querySelectorAll('.mole');
            let randomIdx = Math.floor(Math.random() * 9);
            
            // Tránh việc một con chuột hiện lên liên tiếp ở 1 hang
            while (moles[randomIdx] === lastMole) {
                randomIdx = Math.floor(Math.random() * 9);
            }
            
            const mole = moles[randomIdx];
            lastMole = mole;
            
            mole.classList.add('up');

            // Thời gian chuột ngoi lên ngẫu nhiên từ 700ms đến 1200ms rồi lặn xuống
            setTimeout(() => {
                mole.classList.remove('up');
                peep();
            }, Math.random() * 500 + 700);
        }

        function whack(e) {
            if(!e.classList.contains('up')) return; // Chuột chưa lên thì không đập được
            score++; 
            document.getElementById('mo-score').innerText = score;
            e.classList.remove('up'); // Đập trúng lập tức thụt xuống
        }

        // Bắt đầu chạy trò chơi
        peep();
    </script>
</body>
</html>
