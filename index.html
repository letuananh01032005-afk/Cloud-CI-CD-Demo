<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CI/CD Demo - Giao Diện Tương Tác</title>
    <link rel="stylesheet" href="rip.css">
</head>
<body>

    <div class="container">
        <h1>Cloud CI/CD Demo</h1>
        <p class="subtitle">Hệ thống tự động hóa & Giao diện tương tác</p>

        <div class="interactive-box">
            <p id="message">Bấm nút bên dưới để nhận một thông điệp may mắn ngẫu nhiên!</p>
        </div>

        <button class="btn" id="actionBtn">Khám phá ngay ✨</button>
        <button class="theme-toggle" id="themeBtn">Đổi giao diện Tối/Sáng</button>
    </div>

    <script>
        // 1. Xử lý tương tác hiển thị thông điệp ngẫu nhiên
        const quotes = [
            "🚀 'Hệ thống CI/CD đã build thành công! Tương lai của bạn cũng đang tự động vận hành cực tốt.'",
            "💻 'Code hôm nay có thể có bug, nhưng ngày mai chắc chắn sẽ chạy mượt mà.'",
            "🌟 'Mọi lập trình viên giỏi đều bắt đầu từ việc không bỏ cuộc trước màn hình báo lỗi.'",
            "🎨 'Giao diện đẹp mắt cần những dòng code chuẩn xác. Bạn đang làm rất tốt!'",
            "🔥 'Hãy tiếp tục đẩy code lên GitHub, thế giới công nghệ đang chờ đón sản phẩm của bạn.'"
        ];

        const actionBtn = document.getElementById('actionBtn');
        const messageText = document.getElementById('message');

        actionBtn.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            messageText.style.opacity = 0;
            setTimeout(() => {
                messageText.innerText = quotes[randomIndex];
                messageText.style.opacity = 1;
            }, 200);
        });

        // 2. Xử lý tương tác đổi màu nền (Theme Switcher)
        const themeBtn = document.getElementById('themeBtn');
        let currentTheme = 'dark';

        themeBtn.addEventListener('click', () => {
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                currentTheme = 'light';
            } else {
                document.documentElement.removeAttribute('data-theme');
                currentTheme = 'dark';
            }
        });
    </script>
</body>
</html>
