<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Game Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="dashboard" id="main-menu">
        <h1>GAME HUB 🎮</h1>
        <p class="subtitle">Chọn một trò chơi để bắt đầu trải nghiệm</p>
        <div class="menu">
            <div class="game-card" onclick="openGame('math.html')">
                <i class="fa-solid fa-calculator"></i>
                <h3>Math Quiz</h3>
            </div>
            <div class="game-card" onclick="openGame('snake.html')">
                <i class="fa-solid fa-worm"></i>
                <h3>Rắn Săn Mồi</h3>
            </div>
            <div class="game-card" onclick="openGame('mole.html')">
                <i class="fa-solid fa-gavel"></i>
                <h3>Đập Chuột Máy</h3>
            </div>
        </div>
    </div>

    <div class="dashboard hidden" id="game-container">
        <button class="btn-back" onclick="closeGame()">⬅ Quay lại Menu chính</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function openGame(pageUrl) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            document.getElementById('game-frame').src = pageUrl; // Tải file game lên
        }

        function closeGame() {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('game-frame').src = ""; // Reset trò chơi cũ
        }
    </script>
</body>
</html>
