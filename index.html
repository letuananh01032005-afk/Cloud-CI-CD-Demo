<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CI/CD Demo - Math Game</title>
    <link rel="stylesheet" href="rip.css">
</head>
<body>

    <div class="container">
        <h1>Math Quiz Game 🎮</h1>
        <p class="subtitle">Thử thách tính nhanh - Vận hành bởi CI/CD</p>

        <div class="scoreboard">
            <div>Điểm: <span id="score">0</span></div>
            <div>Chuỗi thắng 🔥: <span id="streak">0</span></div>
        </div>

        <div class="quiz-box" id="question">0 + 0 = ?</div>

        <input type="number" id="userAnswer" class="answer-input" placeholder="Nhập đáp án của bạn..." autocomplete="off">

        <div id="feedback" class="feedback"></div>

        <button class="btn" id="submitBtn">Kiểm tra kết quả</button>
        <button class="theme-toggle" id="themeBtn">Đổi giao diện Tối/Sáng</button>
    </div>

    <script>
        // --- LOGIC TRÒ CHƠI TOÁN HỌC ---
        let currentAnswer = 0;
        let score = 0;
        let streak = 0;

        const questionEl = document.getElementById('question');
        const userAnswerEl = document.getElementById('userAnswer');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const submitBtn = document.getElementById('submitBtn');

        // Hàm tạo câu hỏi ngẫu nhiên
        function generateQuestion() {
            const operators = ['+', '-', '*', '/'];
            const operator = operators[Math.floor(Math.random() * operators.length)];
            let num1 = 0, num2 = 0;

            if (operator === '+') {
                num1 = Math.floor(Math.random() * 50) + 1;
                num2 = Math.floor(Math.random() * 50) + 1;
                currentAnswer = num1 + num2;
            } else if (operator === '-') {
                num1 = Math.floor(Math.random() * 50) + 20;
                num2 = Math.floor(Math.random() * num1); // Đảm bảo không bị âm cho dễ chơi
                currentAnswer = num1 - num2;
            } else if (operator === '*') {
                num1 = Math.floor(Math.random() * 10) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
                currentAnswer = num1 * num2;
            } else if (operator === '/') {
                num2 = Math.floor(Math.random() * 9) + 2; // Số chia từ 2 đến 10
                currentAnswer = Math.floor(Math.random() * 10) + 1; // Thương số từ 1 đến 10
                num1 = num2 * currentAnswer; // Số bị chia để đảm bảo phép chia hết
            }

            questionEl.innerText = `${num1} ${operator} ${num2} = ?`;
            userAnswerEl.value = '';
            userAnswerEl.focus();
        }

        // Hàm kiểm tra đáp án
        function checkAnswer() {
            const userAns = parseInt(userAnswerEl.value);
            
            if (isNaN(userAns)) {
                feedbackEl.innerText = "⚠️ Vui lòng nhập một con số!";
                feedbackEl.className = "feedback";
                return;
            }

            if (userAns === currentAnswer) {
                score += 10;
                streak += 1;
                feedbackEl.innerText = "🎉 Chính xác! +10 điểm.";
                feedbackEl.className = "feedback correct";
            } else {
                streak = 0;
                feedbackEl.innerText = `❌ Sai rồi! Đáp án đúng là: ${currentAnswer}`;
                feedbackEl.className = "feedback wrong";
            }

            // Cập nhật bảng điểm công khai
            scoreEl.innerText = score;
            streakEl.innerText = streak;

            // Chờ 1.5 giây rồi tự động qua câu mới
            setTimeout(generateQuestion, 1500);
        }

        // Bắt sự kiện bấm nút Kiểm tra hoặc nhấn phím Enter
        submitBtn.addEventListener('click', checkAnswer);
        userAnswerEl.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        // Khởi chạy câu hỏi đầu tiên khi load trang
        generateQuestion();


        // --- LOGIC ĐỔI GIAO DIỆN (THEME) ---
        const themeBtn = document.getElementById('themeBtn');
        let currentTheme = 'dark';

        themeBtn.addEventListener('click', () => {
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                currentTheme = 'light';
            } else {
                document.documentElement.removeAttribute('data-theme');
                currentTheme = 'dark';
            }
        });
    </script>
</body>
</html>
